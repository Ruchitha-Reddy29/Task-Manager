<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Task & Team Project Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tasks-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            background-color: #F9FAFB;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.875rem;
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-todo {
            background: var(--light);
            color: var(--text-muted);
        }

        .badge-progress {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .badge-completed {
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
        }

        /* Modal overrides */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-btn {
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .close-btn:hover {
            color: var(--danger);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-layer-group"></i> TaskManager</h2>
            </div>

            <div class="user-info">
                <div class="avatar" id="userInitials">U</div>
                <div class="user-details">
                    <h4 id="userName">User Name</h4>
                    <p id="userRole">Role</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
                    <li><a href="projects.html"><i class="fa-solid fa-briefcase"></i> Projects</a></li>
                    <li><a href="tasks.html" class="active"><i class="fa-solid fa-list-check"></i> Tasks</a></li>
                    <li><a href="kanban.html"><i class="fa-solid fa-border-all"></i> Kanban Board</a></li>
                    <li><a href="team.html"><i class="fa-solid fa-users"></i> Team</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn" onclick="api.logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1>Tasks</h1>
                <div class="actions">
                    <button class="btn btn-primary" id="openCreateModal"><i class="fa-solid fa-plus"></i> New
                        Task</button>
                </div>
            </header>

            <div class="form-group" style="max-width: 300px; margin-bottom: 1rem;">
                <label for="filterProject">Filter by Project</label>
                <select id="filterProject" class="form-control">
                    <option value="">All Projects</option>
                </select>
            </div>

            <div class="tasks-container">
                <table>
                    <thead>
                        <tr>
                            <th>Task Title</th>
                            <th>Project</th>
                            <th>Assigned To</th>
                            <th>Deadline</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tasksTbody">
                        <tr>
                            <td colspan="6" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modalTitle">Create Task</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-control" rows="3" required></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="projectId">Project</label>
                        <select id="projectId" class="form-control" required></select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="assignedTo">Assign To</label>
                        <select id="assignedTo" class="form-control" required></select>
                    </div>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="deadline">Deadline</label>
                        <input type="date" id="deadline" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="status">Status</label>
                        <select id="status" class="form-control" required>
                            <option value="To Do">To Do</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
                    <button type="button" class="btn btn-light" id="cancelModal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/tasks.js"></script>
</body>

</html>
