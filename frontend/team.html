<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team - Task & Team Project Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .member-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            text-align: center;
            transition: var(--transition);
        }

        .member-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .member-avatar {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 auto 1.5rem auto;
        }

        .member-card h3 {
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .member-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .role-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--light);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .role-admin {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .role-manager {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
        }

        .role-user {
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-layer-group"></i> TaskManager</h2>
            </div>

            <div class="user-info">
                <div class="avatar" id="userInitials">U</div>
                <div class="user-details">
                    <h4 id="userName">User Name</h4>
                    <p id="userRole">Role</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
                    <li><a href="projects.html"><i class="fa-solid fa-briefcase"></i> Projects</a></li>
                    <li><a href="tasks.html"><i class="fa-solid fa-list-check"></i> Tasks</a></li>
                    <li><a href="kanban.html"><i class="fa-solid fa-border-all"></i> Kanban Board</a></li>
                    <li><a href="team.html" class="active"><i class="fa-solid fa-users"></i> Team</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn" onclick="api.logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1>Team Members</h1>
            </header>

            <div class="team-grid" id="teamContainer">
                <p>Loading team members...</p>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/team.js"></script>
</body>

</html>
