<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Task & Team Project Management</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fa-solid fa-layer-group"></i> TaskManager</h1>
                <p>Create a new account to get started.</p>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control"
                        placeholder="Create a password (min 6 chars)" minlength="6" required>
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" class="form-control">
                        <option value="user">Team Member (User)</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-block mt-2">
                    <i class="fa-solid fa-user-plus"></i> Sign Up
                </button>
            </form>

            <p class="text-center mt-3">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Check auth on load
        api.checkAuth();

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const btn = document.querySelector('button[type="submit"]');

            try {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing up...';
                btn.disabled = true;

                const data = await api.signup(name, email, password, role);

                // Store user data
                localStorage.setItem('user', JSON.stringify(data));

                showToast('Account created successfully', 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                showToast(error.message, 'error');
                btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Sign Up';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
