<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Task & Team Project Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .projects-table-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            background-color: #F9FAFB;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.35rem 0.75rem;
            font-size: 0.875rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            position: relative;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-btn {
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .close-btn:hover {
            color: var(--danger);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-layer-group"></i> TaskManager</h2>
            </div>

            <div class="user-info">
                <div class="avatar" id="userInitials">U</div>
                <div class="user-details">
                    <h4 id="userName">User Name</h4>
                    <p id="userRole">Role</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
                    <li><a href="projects.html" class="active"><i class="fa-solid fa-briefcase"></i> Projects</a></li>
                    <li><a href="tasks.html"><i class="fa-solid fa-list-check"></i> Tasks</a></li>
                    <li><a href="kanban.html"><i class="fa-solid fa-border-all"></i> Kanban Board</a></li>
                    <li><a href="team.html"><i class="fa-solid fa-users"></i> Team</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <button class="logout-btn" onclick="api.logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1>Projects</h1>
                <div class="actions">
                    <button class="btn btn-primary" id="openCreateModal"><i class="fa-solid fa-plus"></i> New
                        Project</button>
                </div>
            </header>

            <div class="projects-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Project Name</th>
                            <th>Description</th>
                            <th>Start Date</th>
                            <th>Deadline</th>
                            <th>Created By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projectsTbody">
                        <tr>
                            <td colspan="6" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modalTitle">Create Project</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div class="form-group">
                    <label for="projectName">Project Name</label>
                    <input type="text" id="projectName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-control" rows="3" required></textarea>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="deadline">Deadline</label>
                        <input type="date" id="deadline" class="form-control" required>
                    </div>
                </div>
                <div class="form-group" style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
                    <button type="button" class="btn btn-light" id="cancelModal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/projects.js"></script>
</body>

</html>
